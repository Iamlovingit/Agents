name: Build and push runtime images

"on":
  workflow_dispatch:
    inputs:
      image_namespace:
        description: "Image namespace prefix, for example ghcr.io/owner/repo or 172.16.1.12:5010"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-images:
    name: Prepare image matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.prepare.outputs.matrix }}
      date_tag: ${{ steps.prepare.outputs.date_tag }}
      registry: ${{ steps.prepare.outputs.registry }}
      image_namespace: ${{ steps.prepare.outputs.image_namespace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image matrix
        id: prepare
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          IMAGE_NAMESPACE_INPUT: ${{ inputs.image_namespace }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_NAME}" != "${DEFAULT_BRANCH}" ]; then
            echo "This workflow must run on the default branch (${DEFAULT_BRANCH}), current ref is ${GITHUB_REF_NAME}." >&2
            exit 1
          fi

          repo_lower="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          image_namespace="${IMAGE_NAMESPACE_INPUT}"
          if [ -z "${image_namespace}" ]; then
            image_namespace="ghcr.io/${repo_lower}"
          fi
          image_namespace="${image_namespace%/}"
          registry="${image_namespace%%/*}"
          date_tag="$(TZ=Asia/Shanghai date '+v%Y.%-m.%-d')"

          specs=(
            "hermes|.|./hermes/Dockerfile|hermes"
            "hermes-lite|.|./hermes/Dockerfile|hermes-lite"
            "openclaw|.|./openclaw/Dockerfile.openclaw|openclaw"
            "openclaw-lite|.|./openclaw/Dockerfile.openclaw|openclaw-lite"
            "openclaw-shell|.|./openclaw-shell/Dockerfile|openclaw-shell"
          )

          entries=()
          for spec in "${specs[@]}"; do
            IFS="|" read -r runtime context dockerfile image_name <<< "${spec}"

            if [ ! -d "${context}" ]; then
              echo "Build context does not exist for ${runtime}: ${context}" >&2
              exit 1
            fi
            if [ ! -f "${dockerfile}" ]; then
              echo "Dockerfile does not exist for ${runtime}: ${dockerfile}" >&2
              exit 1
            fi

            image="${image_namespace}/${image_name}"
            entry="$(
              jq -cn \
                --arg runtime "${runtime}" \
                --arg context "${context}" \
                --arg dockerfile "${dockerfile}" \
                --arg image "${image}" \
                '{
                  runtime: $runtime,
                  context: $context,
                  dockerfile: $dockerfile,
                  image: $image
                }'
            )"
            entries+=("${entry}")
          done

          matrix_json="$(printf '%s\n' "${entries[@]}" | jq -sc '{include: .}')"
          {
            echo "matrix=${matrix_json}"
            echo "date_tag=${date_tag}"
            echo "registry=${registry}"
            echo "image_namespace=${image_namespace}"
          } >> "${GITHUB_OUTPUT}"

      - name: Summarize image matrix
        shell: bash
        env:
          MATRIX: ${{ steps.prepare.outputs.matrix }}
          DATE_TAG: ${{ steps.prepare.outputs.date_tag }}
          IMAGE_NAMESPACE: ${{ steps.prepare.outputs.image_namespace }}
        run: |
          set -euo pipefail

          {
            echo "### Runtime image matrix"
            echo ""
            echo "- image namespace: \`${IMAGE_NAMESPACE}\`"
            echo "- date tag: \`${DATE_TAG}\`"
            echo ""
            echo "${MATRIX}" | jq -r '.include[] | "- `\(.runtime)`: `\(.image):latest`, `\(.image):" + env.DATE_TAG + "`"'
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

  build-amd64:
    name: Build ${{ matrix.runtime }} linux/amd64
    needs: prepare-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-images.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve reproducible build timestamp
        id: stamp
        shell: bash
        run: |
          set -euo pipefail
          echo "source_date_epoch=$(git log -1 --pretty=%ct)" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to image registry
        uses: docker/login-action@v3
        with:
          registry: ${{ needs.prepare-images.outputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 image
        shell: bash
        env:
          IMAGE: ${{ matrix.image }}
          CONTEXT: ${{ matrix.context }}
          DOCKERFILE: ${{ matrix.dockerfile }}
          RUNTIME: ${{ matrix.runtime }}
          ARCH: amd64
          PLATFORM: linux/amd64
          SOURCE_DATE_EPOCH: ${{ steps.stamp.outputs.source_date_epoch }}
        run: |
          set -euo pipefail

          labels=(
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            --label "org.opencontainers.image.title=${RUNTIME}"
          )

          docker buildx build \
            --file "${DOCKERFILE}" \
            --platform "${PLATFORM}" \
            --pull \
            --provenance=false \
            --sbom=false \
            --build-arg BUILDKIT_MULTI_PLATFORM=1 \
            --build-arg SOURCE_DATE_EPOCH="${SOURCE_DATE_EPOCH}" \
            --cache-from "type=gha,scope=${RUNTIME}-${ARCH}" \
            --cache-to "type=gha,mode=max,scope=${RUNTIME}-${ARCH}" \
            --tag "${IMAGE}:build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${ARCH}" \
            --push \
            "${labels[@]}" \
            "${CONTEXT}"

      - name: Summarize amd64 image
        shell: bash
        env:
          IMAGE: ${{ matrix.image }}
          RUNTIME: ${{ matrix.runtime }}
          ARCH: amd64
        run: |
          {
            echo "### ${RUNTIME} ${ARCH}"
            echo ""
            echo "- image: \`${IMAGE}:build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${ARCH}\`"
            echo "- platform: \`linux/${ARCH}\`"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

  build-arm64:
    name: Build ${{ matrix.runtime }} linux/arm64
    needs: prepare-images
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-images.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve reproducible build timestamp
        id: stamp
        shell: bash
        run: |
          set -euo pipefail
          echo "source_date_epoch=$(git log -1 --pretty=%ct)" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to image registry
        uses: docker/login-action@v3
        with:
          registry: ${{ needs.prepare-images.outputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Build and push arm64 image
        shell: bash
        env:
          IMAGE: ${{ matrix.image }}
          CONTEXT: ${{ matrix.context }}
          DOCKERFILE: ${{ matrix.dockerfile }}
          RUNTIME: ${{ matrix.runtime }}
          ARCH: arm64
          PLATFORM: linux/arm64
          SOURCE_DATE_EPOCH: ${{ steps.stamp.outputs.source_date_epoch }}
        run: |
          set -euo pipefail

          labels=(
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            --label "org.opencontainers.image.title=${RUNTIME}"
          )

          docker buildx build \
            --file "${DOCKERFILE}" \
            --platform "${PLATFORM}" \
            --pull \
            --provenance=false \
            --sbom=false \
            --build-arg BUILDKIT_MULTI_PLATFORM=1 \
            --build-arg SOURCE_DATE_EPOCH="${SOURCE_DATE_EPOCH}" \
            --cache-from "type=gha,scope=${RUNTIME}-${ARCH}" \
            --cache-to "type=gha,mode=max,scope=${RUNTIME}-${ARCH}" \
            --tag "${IMAGE}:build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${ARCH}" \
            --push \
            "${labels[@]}" \
            "${CONTEXT}"

      - name: Summarize arm64 image
        shell: bash
        env:
          IMAGE: ${{ matrix.image }}
          RUNTIME: ${{ matrix.runtime }}
          ARCH: arm64
        run: |
          {
            echo "### ${RUNTIME} ${ARCH}"
            echo ""
            echo "- image: \`${IMAGE}:build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${ARCH}\`"
            echo "- platform: \`linux/${ARCH}\`"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

  publish-manifest:
    name: Publish ${{ matrix.runtime }} manifest
    needs:
      - prepare-images
      - build-amd64
      - build-arm64
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-images.outputs.matrix) }}
    env:
      DATE_TAG: ${{ needs.prepare-images.outputs.date_tag }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to image registry
        uses: docker/login-action@v3
        with:
          registry: ${{ needs.prepare-images.outputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        shell: bash
        env:
          IMAGE: ${{ matrix.image }}
        run: |
          set -euo pipefail

          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:${DATE_TAG}" \
            "${IMAGE}:build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-amd64" \
            "${IMAGE}:build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-arm64"

      - name: Summarize result
        shell: bash
        env:
          IMAGE: ${{ matrix.image }}
          RUNTIME: ${{ matrix.runtime }}
        run: |
          {
            echo "### ${RUNTIME}"
            echo ""
            echo "- image: \`${IMAGE}\`"
            echo "- latest tag: \`${IMAGE}:latest\`"
            echo "- date tag: \`${IMAGE}:${DATE_TAG}\`"
            echo "- platforms: \`linux/amd64\`, \`linux/arm64\`"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"
